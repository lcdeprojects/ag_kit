{% extends 'clinic/base.html' %}

{% block title %}Consultas - Aliada{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <h1 class="fw-extrabold mb-1">Consultas</h1>
        <p class="text-muted">Histórico e agendamentos de consultas.</p>
    </div>
    <a href="{% url 'appointment-create' %}" class="btn btn-primary d-flex align-items-center">
        <i data-lucide="plus-circle" class="me-2"></i> Agendar Consulta
    </a>
</div>


<div class="row g-4 mb-5 row-cols-1 row-cols-md-2 row-cols-lg-4">
    <!-- Total Patients -->
    <div class="col">
        <div class="card h-100 p-2 border-0 shadow-sm">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="bg-celeste-light p-3 rounded-4">
                        <i data-lucide="users" class="text-primary" style="width: 24px; height: 24px;"></i>
                    </div>
                </div>
                <a href="{% url 'user-create' %}" class="text-muted fw-bold mb-1 small text-uppercase"
                    style="letter-spacing: 0.1em;">Criar Usuário
                </a>
            </div>
        </div>
    </div>

    <!-- Expired Plans Card -->
    <div class="col">
        <div class="card h-100 p-2 border-0 shadow-sm {% if expired_count > 0 %}border-start border-danger border-4{% endif %}"
            style="background: white;">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div class="bg-danger bg-opacity-10 p-3 rounded-4">
                        <i data-lucide="list-check" class="text-danger" style="width: 24px; height: 24px;"></i>
                    </div>
                </div>
                <a href="{% url 'user-list' %}" class="text-muted fw-bold mb-1 small text-uppercase"
                    style="letter-spacing: 0.1em;">Lista de Usuários
                </a>
                <h2 class="fw-extrabold mb-0 {% if expired_count > 0 %}text-danger{% endif %}">{{ expired_count }}</h2>
            </div>
        </div>
    </div>
    {% endblock %}

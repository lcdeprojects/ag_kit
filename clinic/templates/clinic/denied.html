{% extends 'clinic/base.html' %}

{% block title %}Acesso Negado — Aliada{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 65vh;">

    <!-- Icon -->
    <div class="mb-4" style="
        width: 96px; height: 96px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f8d7da 0%, #f1aeb5 100%);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 8px 24px rgba(220,53,69,.18);
    ">
        <i data-lucide="shield-x" style="width: 48px; height: 48px; color: #dc3545; stroke-width: 1.5;"></i>
    </div>

    <!-- Status badge -->
    <span class="badge mb-3 px-3 py-2" style="
        background: rgba(220,53,69,.1);
        color: #dc3545;
        font-size: .75rem;
        letter-spacing: .08em;
        border-radius: 100px;
    ">Erro 403</span>

    <!-- Heading -->
    <h1 class="fw-bold mb-2" style="font-size: 1.9rem; letter-spacing: -.03em; color: #1e293b;">
        Acesso Negado
    </h1>

    <!-- Description -->
    <p class="text-muted mb-4" style="max-width: 400px; font-size: .97rem; line-height: 1.6;">
        Você não tem permissão para acessar esta página.<br>
        Entre em contato com o administrador caso acredite que isso é um engano.
    </p>

    <!-- Back button -->
    <a href="javascript:history.back()" class="btn btn-celeste d-inline-flex align-items-center gap-2 px-4 py-2"
       style="border-radius: 12px; font-weight: 600;">
        <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
        Voltar
    </a>

</div>
{% endblock %}
